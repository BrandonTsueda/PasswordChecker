<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A local-only password strength analyzer with entropy estimates and practical feedback.">
  <title>Password Strength Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="tool-panel" aria-labelledby="page-title">
      <div class="header-row">
        <div>
          <p class="eyebrow">Client-side security tool</p>
          <h1 id="page-title">Password Strength Analyzer</h1>
        </div>
        <button id="theme-toggle" type="button" aria-pressed="false">Dark</button>
      </div>

      <label for="password">Password to evaluate</label>
      <div class="input-row">
        <input type="password" id="password" placeholder="Type a password to analyze" autocomplete="off" spellcheck="false">
        <button id="visibility-toggle" type="button" aria-pressed="false">Show</button>
      </div>

      <div class="meter" aria-hidden="true">
        <div id="strength-bar"></div>
      </div>
      <p id="feedback" class="feedback" aria-live="polite">Start typing to see a local strength estimate.</p>

      <ul id="checklist" class="checklist" aria-label="Password requirements"></ul>
      <p class="privacy-note">Runs entirely in your browser. Nothing is sent to a server.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
